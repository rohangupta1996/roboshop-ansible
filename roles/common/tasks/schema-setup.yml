- name: Mongodb Schema
  when: schema_type == "mongo"
  block:
    - name: Setup Mongodb repo file
      ansible.builtin.copy:
        src: mongodb.repo
        dest: /etc/yum.repos.d/mongodb.repo

    - name: Install Mongodb client
      ansible.builtin.yum:
        name: mongodb-org-shell
        state: present
    - name: Load Schema
      ansible.builtin.shell: mongo --host mongodb-dev.rohandevops.online </app/schema/{{component}}.js

- name: MySQL Schema
  when: schema_type == "mysql"
  block:
    - name: Install Mysql Client
      ansible.builtin.yum:
        name: mysql
        state: present
    - name: Load Schema
      ansible.builtin.shell: mysql -h mysql-dev.rohandevops.online -uroot =pRoboShop@1 < /app/schema/{{component}}.sql